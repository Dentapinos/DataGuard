# =============================================
# TEST PROFILE CONFIGURATION
# =============================================
# Test profile configuration - with Testcontainers MySQL
backup.metadata-reader-type=mysql
backup.enabled=true


# =============================================
# SPRING DATA JPA SETTINGS FOR MYSQL
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# =============================================
# SPRINGDOC OPENAPI CONFIGURATION
# =============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs


# =============================================
# BACKUP STORAGE CONFIGURATION
# =============================================
backup.storage-type=FILE_SYSTEM
backup.file-system.base-path=/var/path/to/backups


# =============================================
# APPLICATION LOGGING CONFIGURATION
# =============================================
logging.level.com.dentapinos.dataguard=ERROR
logging.level.com.dentapinos.dataguard.exception=off


# =============================================
# DATABASE CONNECTION CONFIGURATION
# =============================================
# Configure test databases (1 databases)
backup.param.databases[0].database-name=testdb
backup.param.databases[0].display-name=test-db
backup.param.databases[0].url=${MYSQL_JDBC_URL:jdbc:mysql://localhost:3306/testdb?allowPublicKeyRetrieval=true}
backup.param.databases[0].username=testuser
backup.param.databases[0].password=testpass


# =============================================
# RETENTION POLICY CONFIGURATION
# =============================================
# how many days to store daily backups
backup.retention.daily-days=7
# how many weeks to keep weekly backups
backup.retention.weekly-weeks=12
# how many months to keep monthly backups
backup.retention.monthly-months=24
# How many years to keep semi-annual (SEMI_ANNUAL) backups.
backup.retention.semi-annual-years=5
# how many years to keep annual backups
backup.retention.annual-years=10


# =============================================
# BACKUP SCHEDULE CONFIGURATION
# =============================================
# daily backup creation cron
#backup.schedule.daily-backup-cron=0 0 1 * * *
backup.schedule.daily-backup-cron=1 * * * * *


# =============================================
# BACKUP PROMOTION SCHEDULE
# =============================================
# Promotion DAILY -> WEEKLY:
backup.schedule.promote-daily-to-weekly-cron=0 0 2 * * *
# Promotion WEEKLY -> MONTHLY:
backup.schedule.promote-weekly-to-monthly-cron=0 5 2 * * *
# Promotion MONTHLY -> SEMI_ANNUAL:
backup.schedule.promote-monthly-to-semi-annual-cron=0 10 2 * * *
# Promotion SEMI_ANNUAL -> ANNUAL:
backup.schedule.promote-semi-annual-to-annual-cron=0 15 2 * * *


# =============================================
# RETENTION POLICY SCHEDULE
# =============================================
# Applying a retention policy (deleting old backups) daily at 03:30:00
backup.schedule.retention-cron=0 30 3 * * *
