# =============================================
# ОСНОВНЫЕ НАСТРОЙКИ SPRING
# =============================================
# Активация профиля по умолчанию
spring.profiles.active=local


# =============================================
# SPRINGDOC OPENAPI
# =============================================
# Пути к Swagger UI и API спецификации
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs


# =============================================
# НАСТРОЙКИ РЕЗЕРВНОГО КОПИРОВАНИЯ (STORAGE, ПУТЬ)
# =============================================
# Тип хранилища резервных копий
backup.storage-type=FILE_SYSTEM
# Базовый путь к резервным копиям
backup.file-system.base-path=/var/path/to/backups


# =============================================
# ЛОГИРОВАНИЕ
# =============================================
# Уровень логирования по умолчанию (может быть переопределён в профиле)
logging.level.com.dentapinos.dataguard=INFO


# =============================================
# ПОЛИТИКА ХРАНЕНИЯ
# =============================================
# Сколько дней хранить ежедневные резервные копии
backup.retention.daily-days=7
# Сколько недель хранить еженедельные резервные копии
backup.retention.weekly-weeks=12
# Сколько месяцев хранить ежемесячные резервные копии
backup.retention.monthly-months=24
# Сколько лет хранить полугодовые (SEMI_ANNUAL) резервные копии
backup.retention.semi-annual-years=5
# Сколько лет хранить годовые резервные копии
backup.retention.annual-years=10


# =============================================
# РАСПИСАНИЕ РЕЗЕРВНОГО КОПИРОВАНИЯ
# =============================================
# Рекомендуемое время для России:
# - Начало ночи (01:00 по МСК) — минимальная нагрузка на системы
# - backup.schedule.daily-backup-cron=0 0 1 * * * (каждый день в 01:00)
# Для тестирования: backup.schedule.daily-backup-cron=0 0 0 * * * (каждый час в 00 минут)
backup.schedule.daily-backup-cron=0 0 1 * * *


# =============================================
# РАСПИСАНИЕ ПРОДВИЖЕНИЯ РЕЗЕРВНЫХ КОПИЙ
# =============================================
# Продвижение резервных копий (сдвиг по категориям):
# - DAILY -> WEEKLY: сразу после бэкапа (02:00)
# - WEEKLY -> MONTHLY: через 5 минут (02:05)
# - MONTHLY -> SEMI_ANNUAL: через 10 минут (02:10)
# - SEMI_ANNUAL -> ANNUAL: через 15 минут (02:15)
# Все операции завершаются до 03:00, оставляя место для очистки.
backup.schedule.promote-daily-to-weekly-cron=0 0 2 * * *
backup.schedule.promote-weekly-to-monthly-cron=0 5 2 * * *
backup.schedule.promote-monthly-to-semi-annual-cron=0 10 2 * * *
backup.schedule.promote-semi-annual-to-annual-cron=0 15 2 * * *


# =============================================
# РАСПИСАНИЕ ПРИМЕНЕНИЯ ПОЛИТИКИ ХРАНЕНИЯ
# =============================================
# Очистка старых резервных копий:
# - 03:30 по МСК — после завершения всех операций создания и перемещения
# - Достаточно промежутка между задачами (1 час 30 минут между началом и очисткой)
# - Для России: после окончания рабочего дня и пиковой нагрузки
backup.schedule.retention-cron=0 30 3 * * *
